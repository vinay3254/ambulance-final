version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: ambulance-postgres
    environment:
      POSTGRES_DB: ambulance_dispatch
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_INITDB_ARGS: "-E UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./infrastructure/postgres/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ambulance_dispatch"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ambulance-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ambulance-redis
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - redis_data:/data
      - ./infrastructure/redis/redis.conf:/usr/local/etc/redis/redis.conf
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - ambulance-network
    restart: unless-stopped

  osrm:
    image: osrm/osrm-backend:latest
    container_name: ambulance-osrm
    volumes:
      - ./osrm-data:/data
    command: osrm-routed --algorithm mld /data/map.osrm --max-table-size 10000
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ambulance-network
    restart: unless-stopped

  api:
    build:
      context: ./backend/api
      dockerfile: Dockerfile
    container_name: ambulance-api
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://admin:${DB_PASSWORD:-changeme}@postgres:5432/ambulance_dispatch
      REDIS_URL: redis://redis:6379
      OSRM_URL: http://osrm:5000
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      osrm:
        condition: service_started
    ports:
      - "3000:3000"
    volumes:
      - ./backend/api:/app
      - /app/node_modules
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ambulance-network
    restart: unless-stopped

  websocket:
    build:
      context: ./backend/services
      dockerfile: Dockerfile.websocket
    container_name: ambulance-websocket
    environment:
      NODE_ENV: development
      PORT: 3001
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "3001:3001"
    volumes:
      - ./backend/services:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ambulance-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend/dispatcher-dashboard
      dockerfile: Dockerfile.dev
    container_name: ambulance-frontend
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:3000}
      REACT_APP_WS_URL: ${REACT_APP_WS_URL:-http://localhost:3001}
    depends_on:
      - api
      - websocket
    ports:
      - "80:80"
    volumes:
      - ./frontend/dispatcher-dashboard:/app
      - /app/node_modules
    networks:
      - ambulance-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  ambulance-network:
    driver: bridge
