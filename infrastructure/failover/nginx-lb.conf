# Nginx Load Balancer Configuration with Health Checks
# Handles failover and redundancy for ambulance dispatch system

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Enhanced logging with upstream health checks
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'upstream: $upstream_addr rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss;

    # API Server Upstream - Primary cluster with health checks
    upstream api_backend {
        # Enable keepalive connections
        keepalive 32;

        # Primary API servers with health checks
        server api-primary-1.internal:8080 weight=10 max_fails=3 fail_timeout=30s;
        server api-primary-2.internal:8080 weight=10 max_fails=3 fail_timeout=30s;
        
        # Secondary/backup servers
        server api-backup-1.internal:8080 weight=5 max_fails=2 fail_timeout=30s backup;
        server api-backup-2.internal:8080 weight=5 max_fails=2 fail_timeout=30s backup;

        # Health check configuration
        check interval=3000 rise=2 fall=5 timeout=1000 type=http;
        check_http_send "GET /health HTTP/1.0\r\n\r\n";
        check_http_expect_alive http_2xx http_3xx;
    }

    # WebSocket Upstream - Real-time dispatch updates
    upstream websocket_backend {
        keepalive 64;

        server ws-1.internal:8081 weight=5 max_fails=3 fail_timeout=30s;
        server ws-2.internal:8081 weight=5 max_fails=3 fail_timeout=30s;
        server ws-backup.internal:8081 weight=2 backup;

        check interval=5000 rise=2 fall=3 timeout=1000 type=http;
        check_http_send "GET /ws-health HTTP/1.0\r\n\r\n";
        check_http_expect_alive http_2xx;
    }

    # Database Connection Pool Upstream
    upstream db_backend {
        keepalive 128;

        server db-primary.internal:5432 weight=10 max_fails=2 fail_timeout=60s;
        server db-replica-1.internal:5432 weight=5 max_fails=3 fail_timeout=30s;
        server db-replica-2.internal:5432 weight=5 max_fails=3 fail_timeout=30s;

        check interval=2000 rise=1 fall=3 timeout=2000 type=tcp;
    }

    # Cache Layer - Redis Upstream
    upstream cache_backend {
        server redis-primary.internal:6379 weight=10;
        server redis-replica-1.internal:6379 weight=5 backup;
        server redis-replica-2.internal:6379 weight=5 backup;

        check interval=1000 rise=2 fall=5 timeout=500 type=tcp;
    }

    # Upstream health check status page
    server {
        listen 8888;
        server_name localhost;

        location /nginx_status {
            check_status;
            access_log off;
        }

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

    # HTTPS Server - Main entry point
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name dispatch.ambulance.local;

        # SSL Configuration
        ssl_certificate /etc/nginx/ssl/dispatch.crt;
        ssl_certificate_key /etc/nginx/ssl/dispatch.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security Headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # API Routes
        location /api/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            
            # Keepalive settings
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts
            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            
            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;

            # Error handling and retry
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
            proxy_next_upstream_timeout 10s;
        }

        # WebSocket Route
        location /ws/ {
            proxy_pass http://websocket_backend;
            proxy_http_version 1.1;
            
            # WebSocket specific headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket timeouts
            proxy_connect_timeout 7d;
            proxy_send_timeout 7d;
            proxy_read_timeout 7d;
            
            # No buffering for WebSocket
            proxy_buffering off;
            
            # Retry with fallback
            proxy_next_upstream error timeout http_503;
            proxy_next_upstream_tries 1;
        }

        # Static files (with caching)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://api_backend;
            proxy_cache_valid 200 1d;
            proxy_cache_bypass $http_pragma $http_authorization;
            add_header Cache-Control "public, max-age=86400";
        }

        # Health check endpoint
        location /health {
            access_log off;
            proxy_pass http://api_backend/health;
            proxy_connect_timeout 2s;
            proxy_read_timeout 2s;
        }

        # Dispatcher status
        location /status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            deny all;
        }
    }

    # HTTP to HTTPS redirect
    server {
        listen 80;
        listen [::]:80;
        server_name dispatch.ambulance.local;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$server_name$request_uri;
        }
    }

    # Fallback error pages
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

stream {
    # TCP Load Balancing for Database Connections
    upstream db_tcp {
        server db-primary.internal:5432 weight=10;
        server db-replica-1.internal:5432 weight=5 backup;
        server db-replica-2.internal:5432 weight=5 backup;
    }

    server {
        listen 5432;
        proxy_pass db_tcp;
        proxy_connect_timeout 1s;
    }

    # Redis TCP Load Balancing
    upstream redis_tcp {
        server redis-primary.internal:6379;
    }

    server {
        listen 6379;
        proxy_pass redis_tcp;
        proxy_connect_timeout 1s;
    }
}
