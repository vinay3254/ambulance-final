version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: ambulance-postgres-prod
    environment:
      POSTGRES_DB: ambulance_dispatch
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "-E UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./infrastructure/postgres/backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ambulance_dispatch"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - ambulance-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  redis:
    image: redis:7-alpine
    container_name: ambulance-redis-prod
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - redis_data:/data
      - ./infrastructure/redis/redis.prod.conf:/usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - ambulance-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  osrm:
    image: osrm/osrm-backend:latest
    container_name: ambulance-osrm-prod
    volumes:
      - ./osrm-data:/data
    command: osrm-routed --algorithm mld /data/map.osrm --max-table-size 10000
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 60s
      timeout: 15s
      retries: 3
    networks:
      - ambulance-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G

  api:
    image: ${DOCKER_REGISTRY}/ambulance-api:${IMAGE_TAG:-latest}
    container_name: ambulance-api-prod
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://admin:${DB_PASSWORD}@postgres:5432/ambulance_dispatch
      REDIS_URL: redis://redis:6379
      OSRM_URL: http://osrm:5000
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-12h}
      CORS_ORIGIN: ${CORS_ORIGIN}
      LOG_LEVEL: ${LOG_LEVEL:-warn}
      SENTRY_DSN: ${SENTRY_DSN}
      MAX_POOL_SIZE: ${MAX_POOL_SIZE:-20}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      osrm:
        condition: service_started
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - ambulance-network
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1'
          memory: 1G
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first

  websocket:
    image: ${DOCKER_REGISTRY}/ambulance-websocket:${IMAGE_TAG:-latest}
    container_name: ambulance-websocket-prod
    environment:
      NODE_ENV: production
      PORT: 3001
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      SENTRY_DSN: ${SENTRY_DSN}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - ambulance-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  nginx:
    image: nginx:alpine
    container_name: ambulance-nginx-prod
    volumes:
      - ./infrastructure/nginx/nginx.prod.conf:/etc/nginx/nginx.conf
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl
      - ./frontend/dispatcher-dashboard/build:/usr/share/nginx/html
      - ./logs/nginx:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
      - websocket
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ambulance-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  prometheus:
    image: prom/prometheus:latest
    container_name: ambulance-prometheus
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    ports:
      - "9090:9090"
    networks:
      - ambulance-network
    restart: always

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local

networks:
  ambulance-network:
    driver: bridge
